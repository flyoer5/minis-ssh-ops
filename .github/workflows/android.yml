name: Android APK

on:
  push:
    paths:
      - "app/**"
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/android.yml"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Go backend (linux smoke)
        working-directory: backend
        run: |
          go build -o bin/server ./cmd/server
          SSH_AI_DATA_DIR="$RUNNER_TEMP/ssh-ai-data" SSH_AI_PORT=17890 SSH_AI_LOCAL_TOKEN=citoken \
            ./bin/server >"$RUNNER_TEMP/be.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/be.pid"
          for i in $(seq 1 20); do
            if curl -sf "http://127.0.0.1:17890/v1/health"; then
              echo
              break
            fi
            sleep 0.3
          done
          curl -sf "http://127.0.0.1:17890/v1/health"
          kill "$(cat "$RUNNER_TEMP/be.pid")" || true

      - name: Cross-compile Go for android/arm64 (assets + jniLibs)
        run: |
          chmod +x scripts/build-go-android.sh
          ./scripts/build-go-android.sh
          test -s app/android/app/src/main/assets/go/ssh-ai-agent
          test -s app/android/app/src/main/jniLibs/arm64-v8a/libssh_ai_agent.so
          ls -lah app/android/app/src/main/assets/go/ app/android/app/src/main/jniLibs/arm64-v8a/

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build debug APK (arm64)
        working-directory: app
        run: flutter build apk --debug --target-platform android-arm64

      - name: Build release APK (arm64)
        working-directory: app
        run: flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
