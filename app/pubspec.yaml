name: ssh_ai_agent
description: Personal Android AI SSH ops tool (Flutter UI + local Go backend)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Optional copy for tooling; Android packaging uses android/.../assets/go/
  assets:
    - assets/go/README.txt
