name: minis_ssh_ops
description: Local private AI SSH ops — Flutter shell over opsd.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  webview_flutter: ^4.10.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # Directory assets: run ../scripts/prepare_assets.sh before build
    # (writes opsd_arm64 into assets/opsd/ and full UI into assets/web/)
    - assets/opsd/
    - assets/web/
